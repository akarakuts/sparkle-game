# Godot smoke tests on every push / PR to master.
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.6.3"
  GODOT_RELEASE: stable

jobs:
  godot-tests:
    name: Godot headless tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Cache Godot export templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates
          key: godot-templates-${{ env.GODOT_VERSION }}-${{ env.GODOT_RELEASE }}

      - name: Install Godot and export templates
        run: bash .github/scripts/install-godot.sh

      - name: Import project assets
        run: godot --headless --path . --import

      - name: Smoke test
        run: godot --headless --path . -s tools/smoke_test.gd

      - name: Test runner
        run: godot --headless --path . -s tools/test_runner.gd
